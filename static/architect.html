<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HyperXen.ai — Architecture Designer</title>
<style>
/* ── reset ───────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F4F6F8;height:100dvh;display:flex;flex-direction:column;max-width:920px;margin:0 auto}

/* ── header ──────────────────────────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #E5E9ED;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:8px;background:#0078D4;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-text h1{font-size:15px;font-weight:600;color:#1A1A2E}
.header-text p{font-size:11px;color:#8B95A2;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:#22C55E;flex-shrink:0}
.new-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #E5E9ED;background:#fff;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;line-height:1;text-decoration:none}
.new-btn:hover{border-color:#0078D4;color:#0078D4;background:#F0F7FF}

/* ── chat area ───────────────────────────────────────────────────────────── */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}

/* ── message layout ──────────────────────────────────────────────────────── */
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av.bot{background:#E8F4FD;color:#005A9E;border:1px solid #C3DDF5}
.av.user{background:#0078D4;color:#fff}

/* ── bubbles ─────────────────────────────────────────────────────────────── */
.bubble{border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.65;max-width:84%}
.bubble.user{background:#0078D4;color:#fff;border-radius:12px 12px 4px 12px}
.bubble.bot{background:#fff;border:1px solid #E5E9ED;border-radius:12px 12px 12px 4px;color:#1A1A2E;white-space:pre-wrap}
.bubble.card-wrap{padding:0;background:transparent;border:none;white-space:normal;max-width:92%}

/* ── architecture card ───────────────────────────────────────────────────── */
.arch-card{background:#fff;border:1px solid #C3DDF5;border-radius:12px;overflow:hidden;max-width:640px}
.arch-head{background:linear-gradient(135deg,#0078D4 0%,#005A9E 100%);color:#fff;padding:14px 18px}
.arch-title{font-size:15px;font-weight:700;margin-bottom:4px}
.arch-meta{font-size:12px;opacity:.85;display:flex;gap:14px;flex-wrap:wrap}
.arch-img-wrap{padding:16px;background:#F8FBFF;border-top:1px solid #D0E8FF;border-bottom:1px solid #D0E8FF;text-align:center}
.arch-img{max-width:100%;height:auto;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.arch-foot{padding:12px 18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.dl-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #0078D4;background:#fff;color:#0078D4;cursor:pointer;transition:all .15s;white-space:nowrap}
.dl-btn:hover{background:#0078D4;color:#fff}

/* ── typing indicator ────────────────────────────────────────────────────── */
.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{width:5px;height:5px;border-radius:50%;background:#C3DDF5;animation:blink 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ── sample chips ────────────────────────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:6px;background:#F4F6F8;border:1px solid #D1D5DB;color:#005A9E;cursor:pointer}
.chip:hover{background:#E8F4FD;border-color:#0078D4}

/* ── input bar ───────────────────────────────────────────────────────────── */
.bar{padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));background:#fff;border-top:1px solid #E5E9ED;display:flex;gap:10px;flex-shrink:0}
textarea{flex:1;min-height:44px;max-height:140px;resize:none;border:1px solid #D1D5DB;border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;outline:none;line-height:1.5;transition:border-color .15s}
textarea:focus{border-color:#0078D4}
.send{width:44px;height:44px;border-radius:10px;border:none;background:#0078D4;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;transition:background .15s}
.send:hover{background:#005A9E}.send:disabled{background:#D1D5DB;cursor:not-allowed}

/* ── mobile ──────────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .header{padding:10px 12px}
  .header-text p{display:none}
  .chat{padding:14px 12px}
  .bubble{max-width:92%;font-size:13.5px}
  .bubble.card-wrap{max-width:98%}
  .arch-card{max-width:100%}
  .bar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px))}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">H</div>
  <div class="header-text">
    <h1>HyperXen.ai</h1>
    <p>Solution Architecture Designer (Beta)</p>
  </div>
  <div class="header-right">
    <div class="dot"></div>
    <a href="/" class="new-btn" title="Go to VM Pricing">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Pricing
    </a>
    <button class="new-btn" id="newBtn" title="Start a new conversation">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 3 3 12 12 12"/></svg>
      New
    </button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="bar">
  <textarea id="inp" placeholder="Describe your Azure architecture…" rows="1"></textarea>
  <button class="send" id="btn">&#9658;</button>
</div>

<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const btn  = document.getElementById('btn');

let sessionId = mkSid();

function mkSid(){ return 'arch_' + Math.random().toString(36).substr(2,9); }

inp.addEventListener('input', () => { inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
inp.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
btn.addEventListener('click', send);
document.getElementById('newBtn').addEventListener('click', newSession);

// ── session reset ─────────────────────────────────────────────────────────────
function newSession(){
  sessionId = mkSid();
  chat.innerHTML = '';
  loadWelcome();
}

// ── message helpers ───────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addMsg(role, content){
  const w  = document.createElement('div'); w.className = 'msg ' + role;
  const av = document.createElement('div'); av.className = 'av '  + role;
  av.textContent = role === 'bot' ? 'H' : 'You';

  let b;
  if(role === 'user'){
    b = document.createElement('div');
    b.className = 'bubble user';
    b.textContent = content;
  } else if(typeof content === 'object' && content.nodeType){
    // pre-built DOM node (diagram card)
    b = document.createElement('div');
    b.className = 'bubble card-wrap';
    b.appendChild(content);
  } else {
    b = document.createElement('div');
    b.className = 'bubble bot';
    b.textContent = content;
  }

  w.appendChild(av);
  w.appendChild(b);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function addTyping(){
  const w  = document.createElement('div'); w.className = 'msg bot'; w.id = 'typing';
  const av = document.createElement('div'); av.className = 'av bot'; av.textContent = 'H';
  const b  = document.createElement('div'); b.className = 'bubble bot';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  w.appendChild(av); w.appendChild(b);
  chat.appendChild(w);
  chat.scrollTop = chat.scrollHeight;
}

// ── diagram card builder ──────────────────────────────────────────────────────
function buildDiagramCard(arch, pngBase64){
  const card = document.createElement('div');
  card.className = 'arch-card';

  // Header
  const head = document.createElement('div');
  head.className = 'arch-head';
  const titleEl = document.createElement('div');
  titleEl.className = 'arch-title';
  titleEl.textContent = arch.title || 'Architecture';
  head.appendChild(titleEl);
  const metaEl = document.createElement('div');
  metaEl.className = 'arch-meta';
  const resCount = arch.zones
    ? arch.zones.reduce((s, z) => s + (z.resources||[]).length, 0)
    : (arch.resources||[]).length;
  const connCount = (arch.connections||[]).length;
  const subtitle = arch.subtitle || arch.region || '';
  metaEl.innerHTML =
    (subtitle ? `<span>${esc(subtitle)}</span>` : '') +
    `<span>&#9634; ${resCount} resource${resCount!==1?'s':''}</span>` +
    `<span>&#8596; ${connCount} connection${connCount!==1?'s':''}</span>`;
  head.appendChild(metaEl);
  card.appendChild(head);

  // Image
  const imgWrap = document.createElement('div');
  imgWrap.className = 'arch-img-wrap';
  const img = document.createElement('img');
  img.className = 'arch-img';
  img.alt = arch.title || 'Architecture diagram';
  img.src = 'data:image/png;base64,' + pngBase64;
  imgWrap.appendChild(img);
  card.appendChild(imgWrap);

  // Footer: download button
  const foot = document.createElement('div');
  foot.className = 'arch-foot';
  const dlBtn = document.createElement('button');
  dlBtn.className = 'dl-btn';
  dlBtn.innerHTML = '&#8659; Download PNG';
  dlBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = img.src;
    const slug = (arch.title||'architecture').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    a.download = slug + '.png';
    a.click();
  });
  foot.appendChild(dlBtn);
  card.appendChild(foot);

  return card;
}

// ── send ──────────────────────────────────────────────────────────────────────
async function send(){
  const text = inp.value.trim();
  if(!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = true;
  addMsg('user', text);
  addTyping();

  try{
    const r = await fetch('/api/diagram/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text}),
    });
    if(!r.ok) throw new Error('Server error ' + r.status);
    const d = await r.json();
    document.getElementById('typing')?.remove();

    if(d.type === 'architecture'){
      if(d.png_base64){
        addMsg('bot', buildDiagramCard(d.json, d.png_base64));
      } else {
        // Render failed — still show the JSON as a fallback
        addMsg('bot', 'Architecture complete (diagram render unavailable):\n\n' + JSON.stringify(d.json, null, 2));
      }
    } else {
      addMsg('bot', d.reply || d.error || 'Unexpected response.');
    }
  } catch(e){
    document.getElementById('typing')?.remove();
    addMsg('bot', 'Network error: ' + e.message);
  } finally{
    btn.disabled = false;
    inp.focus();
  }
}

// ── welcome ───────────────────────────────────────────────────────────────────
const SAMPLES = [
  'A web app with a SQL database',
  'Three-tier app with load balancer and 2 VMs',
  'Microservices on App Service with storage',
  'Simple VM with a SQL database in East US',
];

function loadWelcome(){
  const b = addMsg('bot', 'Hi! Describe the Azure solution you need and I\'ll ask a few questions to design an architecture diagram for you.');
  const chips = document.createElement('div');
  chips.className = 'chips';
  SAMPLES.forEach(s => {
    const c = document.createElement('button');
    c.className = 'chip';
    c.textContent = s;
    c.addEventListener('click', () => { inp.value = s; inp.focus(); });
    chips.appendChild(c);
  });
  b.appendChild(chips);
}

loadWelcome();
</script>
</body>
</html>
