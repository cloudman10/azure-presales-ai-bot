<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HyperXen.ai — Azure VM Pricing</title>
<style>
/* ── reset ─────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F4F6F8;height:100dvh;display:flex;flex-direction:column;max-width:920px;margin:0 auto}

/* ── header ─────────────────────────────────────────────────────────────── */
.header{display:flex;align-items:center;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #E5E9ED;flex-shrink:0}
.logo{width:32px;height:32px;border-radius:8px;background:#0078D4;color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.header-text h1{font-size:15px;font-weight:600;color:#1A1A2E}
.header-text p{font-size:11px;color:#8B95A2;margin-top:1px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;background:#22C55E;flex-shrink:0}
.new-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #E5E9ED;background:#fff;color:#666;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;line-height:1}
.new-btn:hover{border-color:#0078D4;color:#0078D4;background:#F0F7FF}

/* ── chat area ──────────────────────────────────────────────────────────── */
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:4px}.chat::-webkit-scrollbar-track{background:transparent}.chat::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}

/* ── message layout ─────────────────────────────────────────────────────── */
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.av.bot{background:#E8F4FD;color:#005A9E;border:1px solid #C3DDF5}
.av.user{background:#0078D4;color:#fff}

/* ── bubbles ────────────────────────────────────────────────────────────── */
.bubble{border-radius:12px;padding:12px 16px;font-size:14px;line-height:1.65;max-width:84%}
.bubble.user{background:#0078D4;color:#fff;border-radius:12px 12px 4px 12px}
.bubble.bot{background:#fff;border:1px solid #E5E9ED;border-radius:12px 12px 12px 4px;color:#1A1A2E;white-space:pre-wrap}
.bubble.card-wrap{padding:0;background:transparent;border:none;white-space:normal}

/* ── pricing card ───────────────────────────────────────────────────────── */
.price-card{background:#fff;border:1px solid #C3DDF5;border-radius:12px;overflow:hidden;white-space:normal;max-width:520px;font-size:14px}

.pc-head{background:linear-gradient(135deg,#0078D4 0%,#005A9E 100%);color:#fff;padding:14px 18px}
.pc-vm{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pc-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.5px}
.pc-specs{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;opacity:.9}

.pc-payg{background:#F0F7FF;border-bottom:1px solid #D0E8FF;padding:12px 18px;display:flex;align-items:baseline;flex-wrap:wrap;gap:4px 14px}
.pc-payg-lbl{font-size:11px;font-weight:600;color:#005A9E;text-transform:uppercase;letter-spacing:.5px}
.pc-payg-mo{font-size:22px;font-weight:700;color:#0078D4}
.pc-payg-unit{font-size:13px;font-weight:400;color:#5A7A9A}
.pc-payg-hr{font-size:13px;color:#5A7A9A}

.pc-sections{padding:2px 0}
.pcs{border-bottom:1px solid #EEF2F7}
.pcs:last-child{border-bottom:none}
.pcs-header{padding:10px 18px;font-size:13px;font-weight:500;color:#333;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.pcs-header .chev{color:#8B95A2;font-size:16px;transition:transform .2s;flex-shrink:0}
.pcs.open .pcs-header .chev{transform:rotate(90deg)}
.pcs-header:hover{background:#F8FBFF}
.pcs-badge{font-size:10px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:600}
.bg-green{background:#DCFCE7;color:#166534}
.bg-blue{background:#DBEAFE;color:#1D4ED8}
.bg-purple{background:#F3E8FF;color:#7E22CE}
.pcs-body{padding:4px 18px 12px;font-size:13px;color:#444;flex-direction:column;gap:3px;display:none}
.pcs.open .pcs-body{display:flex}
.pcs-row{display:flex;gap:6px}
.pcs-lbl{min-width:72px;color:#8B95A2;flex-shrink:0}
.pcs-val{font-weight:600;color:#1A1A2E}

.pc-foot{padding:12px 18px;border-top:1px solid #EEF2F7}

/* ── storage block ──────────────────────────────────────────────────────── */
.pc-storage{padding:12px 18px;border-top:1px solid #EEF2F7;font-size:13px}
.pc-storage-title{font-size:11px;font-weight:600;color:#005A9E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.pc-storage-subtotal{display:flex;justify-content:space-between;font-weight:600;color:#1A1A2E;border-top:1px solid #EEF2F7;margin-top:6px;padding-top:6px}
.pc-storage-note{font-size:12px;color:#B45309;padding:2px 0 2px 4px;font-style:italic}
.pc-storage-fn{font-size:11px;color:#8B95A2;margin-top:5px;line-height:1.5}
.pc-disk-row{display:flex;align-items:center;gap:6px;padding:4px 0;flex-wrap:wrap}
.pc-disk-role{font-size:11px;color:#8B95A2;min-width:52px;flex-shrink:0}
.pc-disk-select{font-size:12px;border:1px solid #D1D5DB;border-radius:6px;padding:3px 6px;color:#1A1A2E;background:#fff;cursor:pointer;max-width:155px}
.pc-disk-select:focus{outline:none;border-color:#0078D4}
.pc-disk-price{font-size:13px;font-weight:600;color:#1A1A2E;margin-left:auto;white-space:nowrap}
.pc-disk-rm{font-size:15px;border:none;background:none;color:#C0C7CF;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
.pc-disk-rm:hover{color:#D32F2F}
.pc-disk-add{margin-top:8px;font-size:12px;padding:4px 10px;border-radius:6px;border:1px dashed #0078D4;background:#fff;color:#0078D4;cursor:pointer;display:block}
.pc-disk-add:hover{background:#F0F7FF}

/* ── download buttons ───────────────────────────────────────────────────── */
.dl-btns{display:flex;gap:8px;flex-wrap:wrap}
.dl-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #0078D4;background:#fff;color:#0078D4;cursor:pointer;transition:all .15s;white-space:nowrap}
.dl-btn:hover{background:#0078D4;color:#fff}
.dl-btn:disabled{border-color:#D1D5DB;color:#8B95A2;cursor:not-allowed}

/* ── quote panel (drawer) ───────────────────────────────────────────────── */
.quote-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #22C55E;background:#fff;color:#166534;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;line-height:1}
.quote-btn:hover{border-color:#166534;background:#DCFCE7}
.qbadge{background:#22C55E;color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:2px;display:none}
.qp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:199;display:none}
.qp-overlay.open{display:block}
.quote-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:#fff;border-left:1px solid #E5E9ED;transform:translateX(100%);transition:transform .3s ease;z-index:200;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.quote-panel.open{transform:translateX(0)}
.qp-head{padding:14px 16px;border-bottom:1px solid #EEF2F7;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#fff}
.qp-title{font-size:14px;font-weight:600;color:#1A1A2E}
.qp-close{border:none;background:none;font-size:22px;color:#8B95A2;cursor:pointer;line-height:1;padding:0 4px}
.qp-close:hover{color:#1A1A2E}
.qp-items{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.qi{padding:10px 12px;background:#F8FBFF;border:1px solid #C3DDF5;border-radius:8px;font-size:13px}
.qi-label{font-weight:600;color:#1A1A2E;margin-bottom:3px}
.qi-detail{color:#5A7A9A;font-size:12px;margin-bottom:6px;line-height:1.5}
.qi-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.qi-total{font-weight:700;color:#0078D4;font-size:13px}
.qi-rm{font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid #FCA5A5;background:#FFF5F5;color:#DC2626;cursor:pointer;flex-shrink:0}
.qi-rm:hover{background:#FEE2E2}
.qp-foot{padding:12px 16px;border-top:1px solid #EEF2F7;flex-shrink:0;background:#fff}
.qp-grand{display:flex;justify-content:space-between;font-size:15px;font-weight:700;color:#1A1A2E;margin-bottom:10px}
.qp-clear{width:100%;padding:8px;border-radius:8px;border:1px solid #E5E9ED;background:#fff;color:#8B95A2;cursor:pointer;font-size:12px}
.qp-clear:hover{border-color:#DC2626;color:#DC2626;background:#FFF5F5}
.qp-export{display:none;gap:6px;margin-bottom:8px}
.qp-export .dl-btn{flex:1;font-size:12px;padding:7px 0;text-align:center}
.qp-empty{color:#8B95A2;font-size:13px;text-align:center;padding:30px 0}

/* ── count + basket button on each pricing card ─────────────────────────── */
.pc-add-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.pc-qty-lbl{font-size:12px;color:#8B95A2}
.pc-qty{width:58px;padding:5px 8px;border:1px solid #D1D5DB;border-radius:6px;font-size:13px;text-align:center}
.pc-qty:focus{outline:none;border-color:#0078D4}
.pc-atq{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #22C55E;background:#fff;color:#166534;cursor:pointer;transition:all .15s;white-space:nowrap}
.pc-atq:hover{background:#DCFCE7}
.pc-atq:disabled{border-color:#D1D5DB;color:#8B95A2;background:#fff;cursor:not-allowed}

/* ── in-header term radios ───────────────────────────────────────────────── */
.pcs-term-radio{accent-color:#0078D4;cursor:pointer;flex-shrink:0}
.pc-payg-hdr{width:100%;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.pcs-hdr-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.pcs-hdr-price{margin-left:auto;font-size:11px;font-weight:600;color:#005A9E;white-space:nowrap;padding-right:6px}
.pcs-header:has(.pcs-term-radio:checked){background:#EBF5FF}

/* ── typing indicator ───────────────────────────────────────────────────── */
.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{width:5px;height:5px;border-radius:50%;background:#C3DDF5;animation:blink 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ── sample chips ───────────────────────────────────────────────────────── */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.chip{font-size:11.5px;padding:5px 10px;border-radius:6px;background:#F4F6F8;border:1px solid #D1D5DB;color:#005A9E;cursor:pointer}
.chip:hover{background:#E8F4FD;border-color:#0078D4}

/* ── input bar ──────────────────────────────────────────────────────────── */
.bar{padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));background:#fff;border-top:1px solid #E5E9ED;display:flex;gap:10px;flex-shrink:0}
textarea{flex:1;min-height:44px;max-height:140px;resize:none;border:1px solid #D1D5DB;border-radius:10px;padding:11px 14px;font-family:inherit;font-size:14px;outline:none;line-height:1.5;transition:border-color .15s}
textarea:focus{border-color:#0078D4}
.send{width:44px;height:44px;border-radius:10px;border:none;background:#0078D4;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;transition:background .15s}
.send:hover{background:#005A9E}.send:disabled{background:#D1D5DB;cursor:not-allowed}

/* ── mobile ─────────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .header{padding:10px 12px}
  .header-text p{display:none}
  .chat{padding:14px 12px}
  .bubble{max-width:92%;font-size:13.5px}
  .bubble.card-wrap{max-width:96%}
  .price-card{max-width:100%}
  .pc-payg-mo{font-size:20px}
  .pc-specs{gap:10px}
  .bar{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom,10px))}
  .quote-panel{width:100%}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">H</div>
  <div class="header-text">
    <h1>HyperXen.ai</h1>
    <p>Azure VM Pricing Engine (Beta)</p>
  </div>
  <div class="header-right">
    <div class="dot"></div>
    <button class="quote-btn" id="quoteToggle" onclick="toggleQuotePanel()" title="View quote basket">
      &#128722; Quote <span class="qbadge" id="qbadge"></span>
    </button>
    <button class="new-btn" onclick="newConversation()" title="Start a new conversation">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9"/><polyline points="3 3 3 12 12 12"/></svg>
      New
    </button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="bar">
  <textarea id="inp" placeholder="e.g. D4s_v5 Windows Australia East" rows="1"></textarea>
  <button class="send" id="btn">&#9658;</button>
</div>

<div class="qp-overlay" id="qpOverlay" onclick="toggleQuotePanel()"></div>
<div class="quote-panel" id="quotePanel">
  <div class="qp-head">
    <span class="qp-title">&#128722; Quote Summary</span>
    <button class="qp-close" onclick="toggleQuotePanel()" title="Close">&#215;</button>
  </div>
  <div class="qp-items" id="qpItems">
    <div class="qp-empty">No VMs in quote yet.</div>
  </div>
  <div class="qp-foot">
    <div class="qp-grand"><span>Grand Total</span><span id="qpGrand">USD 0.00/month</span></div>
    <div class="qp-export" id="qpExport">
      <button class="dl-btn" id="qpExcelBtn" onclick="exportBasket('excel',this)">&#8659; Excel</button>
      <button class="dl-btn" id="qpPdfBtn"   onclick="exportBasket('pdf',this)">&#8659; PDF</button>
    </div>
    <button class="qp-clear" onclick="clearQuote()">Clear quote</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const btn  = document.getElementById('btn');

let sessionId = mkSid();
let storedPicks = null;  // {skus, region, region_display, os} from last advisor response
let _cardSeq = 0;
function mkSid(){ return 'sess_' + Math.random().toString(36).substr(2,9); }

inp.addEventListener('input', ()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });
inp.addEventListener('keydown', e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
btn.addEventListener('click', send);

// ── new conversation ─────────────────────────────────────────────────────────
function newConversation(){
  sessionId = mkSid();
  storedPicks = null;
  chat.innerHTML = '';
  loadWelcome();
  loadBasket();   // new session → basket will be empty; renders "No VMs in quote yet."
}

// ── helpers ──────────────────────────────────────────────────────────────────
function parseUSDMonth(str){
  if(!str) return 0;
  const m = str.match(/[\d,]+\.?\d*/);
  return m ? parseFloat(m[0].replace(/,/g,'')) : 0;
}

// ── pricing parser ───────────────────────────────────────────────────────────
// Parses the exact output format from pricing_agent.py _format_pricing().
// Section dividers are "--- Foo ---" lines. PAYG uses "Per VM: USD X/hr | USD Y/month".
// SP/RI sub-sections are non-indented headers; their data rows are indented with spaces.
// AHB rows ("PAYG + HB:", "1-Year RI + HB:", "3-Year RI + HB:") are not indented.
function normKey(k){ return k.trim().toLowerCase().replace(/[\s\-_]+/g,''); }

function parsePricing(text){
  if(!text.includes('=== Azure VM Pricing Estimate ===')) return null;

  const lines = text.split('\n');
  const info  = {};
  // payg holds the always-visible PAYG box data
  const payg  = { hourly:'', monthly:'' };
  // secs holds collapsible sections: [{key,label,badge,bc,rows:[{lbl,val}]}]
  const secs  = [];
  // storage holds the non-collapsible disk pricing block
  let storage = null;

  // block tracks which top-level section we're currently inside
  let block   = 'info'; // 'info'|'payg'|'sp'|'ri'|'ahb'|'storage'
  let curSec  = null;   // ref to the current collapsible section being filled

  function newSec(key, label, badge, bc){
    curSec = { key, label, badge:badge||null, bc:bc||'', rows:[] };
    secs.push(curSec);
  }

  for(const raw of lines){
    const l = raw.trim();
    if(!l || l==='=== Azure VM Pricing Estimate ===') continue;

    // "=== Storage ===" section header (not a --- divider)
    if(l === '=== Storage ==='){
      block = 'storage'; curSec = null;
      storage = storage || {disks:[], subtotal:'', footnotes:[]};
      continue;
    }

    // "--- Section Header ---" dividers
    const div = l.match(/^---+\s*(.+?)\s*---+$/);
    if(div){
      const h = div[1];
      curSec = null;
      if(/^PAYG/i.test(h)){
        block = 'payg';
      } else if(/Savings Plan/i.test(h)){
        block = 'sp';
      } else if(/Reserved/i.test(h)){
        block = 'ri';
      } else if(/Hybrid Benefit/i.test(h)){
        block = 'ahb';
        newSec('ahb','Azure Hybrid Benefit','Windows','bg-purple');
      }
      continue;
    }

    // Skip parenthetical notes and footnotes
    if(/^\(/.test(l) || /^All prices|^Monthly estimates/.test(l)) continue;

    // ── info block ─────────────────────────────────────────────────────────
    if(block === 'info'){
      const im = l.match(/^(VM|OS|Region|vCPUs?|RAM|Temp\s*Storage|Quantity)\s*:\s*(.+)/i);
      if(im) info[normKey(im[1])] = im[2].trim();
      continue;
    }

    // ── PAYG block ─────────────────────────────────────────────────────────
    // Format: "Per VM:  USD 0.2860/hr  |  USD 208.78/month"
    if(block === 'payg'){
      const m = l.match(/Per VM:\s*(.+?\/hr)\s*\|\s*(.+)/i);
      if(m){ payg.hourly = m[1].trim(); payg.monthly = m[2].trim(); }
      continue;
    }

    // ── Savings Plan block ─────────────────────────────────────────────────
    // Non-indented lines are sub-section headers ("1-Year Savings Plan (~X%):")
    // or top-level info ("License:") — the License line is skipped.
    // Indented lines are data rows for the current sub-section.
    if(block === 'sp'){
      if(!raw.startsWith(' ') && !raw.startsWith('\t')){
        if(/^1-?Year\s+Savings/i.test(l)){
          newSec('sp1','1-Year Savings Plan','1 yr','bg-blue'); block='sp';
        } else if(/^3-?Year\s+Savings/i.test(l)){
          newSec('sp3','3-Year Savings Plan','3 yr','bg-blue'); block='sp';
        }
        // Top-level lines (like "License:", "Savings Plan: not available") are skipped
      } else if(curSec){
        const kv = l.match(/^([^:]+):\s*(.+)/);
        if(kv) curSec.rows.push({lbl:kv[1].trim(), val:kv[2].trim()});
      }
      continue;
    }

    // ── Reserved Instances block ───────────────────────────────────────────
    // Non-indented: "1-Year RI  (save X%):" or "3-Year RI  (save X%):"
    // or "1-Year RI: not available..." (creates empty section, filtered later)
    // Indented: "  Per VM:  USD X/month" etc.
    if(block === 'ri'){
      if(!raw.startsWith(' ') && !raw.startsWith('\t')){
        if(/^1-?Year\s+RI/i.test(l)){
          newSec('ri1','1-Year Reserved Instance','1 yr','bg-green'); block='ri';
        } else if(/^3-?Year\s+RI/i.test(l)){
          newSec('ri3','3-Year Reserved Instance','3 yr','bg-green'); block='ri';
        }
      } else if(curSec){
        const kv = l.match(/^([^:]+):\s*(.+)/);
        if(kv) curSec.rows.push({lbl:kv[1].trim(), val:kv[2].trim()});
      }
      continue;
    }

    // ── Azure Hybrid Benefit block ─────────────────────────────────────────
    // Rows: "PAYG + HB:", "1-Year RI + HB:", "3-Year RI + HB:"
    if(block === 'ahb' && curSec){
      const kv = l.match(/^([^:]+):\s*(.+)/);
      if(kv) curSec.rows.push({lbl:kv[1].trim(), val:kv[2].trim()});
    }

    // ── Storage block ──────────────────────────────────────────────────────
    // Disk lines: "OS disk  : Premium SSD P10 (128 GiB)* — USD 19.71/month"
    // Downgrade : "← downgraded: VM does not support premium storage"
    // Subtotal  : "Storage subtotal: USD 71.93/month"
    // Footnotes : "* Capacity only; ..." / "** v2 capacity at free baseline..."
    if(block === 'storage' && storage){
      const dm = l.match(/^(OS disk|Data disk)\s*:\s*(.+?)\s*—\s*(.+)/i);
      if(dm){
        storage.disks.push({role:dm[1].replace(/\s+$/,''), label:dm[2].trim(), cost:dm[3].trim(), note:null});
        continue;
      }
      if(/^←/.test(l) && storage.disks.length){
        storage.disks[storage.disks.length-1].note = l; continue;
      }
      const sm = l.match(/^Storage subtotal:\s*(.+)/i);
      if(sm){ storage.subtotal = sm[1].trim(); continue; }
      if(/^\*|^Default OS disk/.test(l)){ storage.footnotes.push(l); continue; }
      if(l.startsWith('STORAGE_DATA:')){
        try{ storage.data = JSON.parse(l.slice(l.indexOf(':')+1).trim()); }catch(_){}
        continue;
      }
    }
  }

  // Drop sections that ended up empty (e.g. "not available" RI lines)
  const validSecs = secs.filter(s => s.rows.length > 0);
  const result = (payg.hourly || validSecs.length) ? {info, payg, secs:validSecs, storage} : null;
  // ── DIAGNOSTIC: remove after confirming storage parsing ──────────────────
  console.log('[parsePricing] raw has "=== Storage ===":', text.includes('=== Storage ==='));
  console.log('[parsePricing] storage object:', JSON.stringify(storage));
  console.log('[parsePricing] result:', result ? 'non-null' : 'null', '| storage in result:', result?.storage);
  // ────────────────────────────────────────────────────────────────────────
  return result;
}

// ── term extractor: build [{label, monthly}] from parsed pricing ──────────────
function _extractTerms(payg, secs){
  const terms = [];
  const paygM = parseUSDMonth(payg.monthly);
  if(paygM > 0) terms.push({label:'PAYG', monthly:paygM});
  for(const sec of secs){
    if(sec.key === 'sp1' || sec.key === 'sp3'){
      const totalRow = sec.rows.find(r => r.lbl.toLowerCase() === 'total');
      const perVmRow = sec.rows.find(r => /^per vm/i.test(r.lbl));
      const row = totalRow || perVmRow;
      if(row){ const m = parseUSDMonth(row.val); if(m > 0) terms.push({label:sec.label, monthly:m}); }
    } else if(sec.key === 'ri1' || sec.key === 'ri3'){
      const row = sec.rows.find(r => /^per vm/i.test(r.lbl));
      if(row){ const m = parseUSDMonth(row.val); if(m > 0) terms.push({label:sec.label, monthly:m}); }
    } else if(sec.key === 'ahb'){
      for(const row of sec.rows){
        if(/\bHB\b/i.test(row.lbl)){ const m = parseUSDMonth(row.val); if(m > 0) terms.push({label:row.lbl, monthly:m}); }
      }
    }
  }
  return terms;
}

// ── pricing card builder ─────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildCard(text){
  const p = parsePricing(text);
  if(!p) return null;

  const {info, payg, secs} = p;

  const card = document.createElement('div');
  card.className = 'price-card';

  // header: VM name, OS badge, specs row
  const vm  = info['vm']||'';
  const os  = info['os']||'';
  const reg = info['region']||'';
  const cpu = info['vcpus']||info['vcpu']||'';
  const ram = info['ram']||'';

  const head = document.createElement('div');
  head.className = 'pc-head';
  head.innerHTML = `
    <div class="pc-vm">
      ${vm?`<span>${esc(vm)}</span>`:''}
      ${os?`<span class="pc-badge">${esc(os)}</span>`:''}
    </div>
    <div class="pc-specs">
      ${reg?`<span>🌏 ${esc(reg)}</span>`:''}
      ${cpu?`<span>⚡ ${esc(cpu)}</span>`:''}
      ${ram?`<span>💾 ${esc(ram)}</span>`:''}
    </div>`;
  card.appendChild(head);

  // ── term setup: one radio group per card ────────────────────────────────────
  const _terms = _extractTerms(payg, secs);
  const _rgroup = 'tc' + (++_cardSeq);
  const _hasTerms = _terms.length > 1;

  function _mkRadio(label, monthly, isDefault){
    const rb = document.createElement('input');
    rb.type='radio'; rb.name=_rgroup; rb.className='pcs-term-radio';
    rb.value=monthly; rb.dataset.label=label; rb.checked=isDefault;
    rb.addEventListener('click', e => e.stopPropagation());
    return rb;
  }
  function _secM(sec){
    if(sec.key==='sp1'||sec.key==='sp3'){
      const r=sec.rows.find(r=>r.lbl.toLowerCase()==='total')||sec.rows.find(r=>/^per vm/i.test(r.lbl));
      return r ? parseUSDMonth(r.val) : 0;
    }
    if(sec.key==='ri1'||sec.key==='ri3'){
      const r=sec.rows.find(r=>/^per vm/i.test(r.lbl));
      return r ? parseUSDMonth(r.val) : 0;
    }
    return 0;
  }

  // PAYG box — radio embedded in label row, prices below
  if(payg.hourly || payg.monthly){
    const pg = document.createElement('div'); pg.className = 'pc-payg';
    const paygM = parseUSDMonth(payg.monthly);
    const hdrRow = document.createElement('div'); hdrRow.className = 'pc-payg-hdr';
    if(_hasTerms && paygM) hdrRow.appendChild(_mkRadio('PAYG', paygM, true));
    const lbl = document.createElement('span'); lbl.className='pc-payg-lbl'; lbl.textContent='Pay-as-You-Go';
    hdrRow.appendChild(lbl);
    pg.appendChild(hdrRow);
    if(payg.monthly){ const m=document.createElement('div'); m.className='pc-payg-mo'; m.textContent=payg.monthly; pg.appendChild(m); }
    if(payg.hourly){ const h=document.createElement('div'); h.className='pc-payg-hr'; h.textContent=payg.hourly; pg.appendChild(h); }
    card.appendChild(pg);
  }

  // Collapsible sections (SP/RI with radio+price in header) + AHB as flat selectable rows
  if(secs.length){
    const wrap = document.createElement('div'); wrap.className = 'pc-sections';
    for(const sec of secs){
      if(sec.key === 'ahb'){
        // Each AHB pricing row: collapsible .pcs with radio+price in header + breakdown body
        for(const row of sec.rows){
          if(!/\bHB\b/i.test(row.lbl)) continue;
          const m = parseUSDMonth(row.val); if(!m) continue;
          const pcs = document.createElement('div'); pcs.className = 'pcs';
          const hdr = document.createElement('div'); hdr.className = 'pcs-header';
          hdr.addEventListener('click', () => pcs.classList.toggle('open'));
          const left = document.createElement('span'); left.className = 'pcs-hdr-left';
          if(_hasTerms) left.appendChild(_mkRadio(row.lbl, m, false));
          const nm=document.createElement('span'); nm.textContent=row.lbl; left.appendChild(nm);
          const pr=document.createElement('span'); pr.className='pcs-hdr-price'; pr.textContent='USD '+m.toFixed(2)+'/mo'; left.appendChild(pr);
          hdr.appendChild(left);
          const chev=document.createElement('span'); chev.className='chev'; chev.textContent='›'; hdr.appendChild(chev);
          pcs.appendChild(hdr);
          const body = document.createElement('div'); body.className = 'pcs-body';
          [['Compute','USD '+m.toFixed(2)+'/month'],
           ['License','USD 0.00/month  (Azure Hybrid Benefit)'],
           ['Total',  'USD '+m.toFixed(2)+'/month']].forEach(([bl,bv]) => {
            const r=document.createElement('div'); r.className='pcs-row';
            r.innerHTML=`<span class="pcs-lbl">${esc(bl)}</span><span class="pcs-val">${esc(bv)}</span>`;
            body.appendChild(r);
          });
          pcs.appendChild(body);
          wrap.appendChild(pcs);
        }
      } else {
        // SP / RI: collapsible with radio + total price in header
        const sm = _secM(sec);
        const pcs = document.createElement('div'); pcs.className = 'pcs';
        const hdr = document.createElement('div'); hdr.className = 'pcs-header';
        hdr.addEventListener('click', () => pcs.classList.toggle('open'));
        const left = document.createElement('span'); left.className = 'pcs-hdr-left';
        if(_hasTerms && sm) left.appendChild(_mkRadio(sec.label, sm, false));
        const nm = document.createElement('span'); nm.textContent = sec.label; left.appendChild(nm);
        if(sec.badge){ const b=document.createElement('span'); b.className='pcs-badge '+sec.bc; b.textContent=sec.badge; left.appendChild(b); }
        if(sm){ const pr=document.createElement('span'); pr.className='pcs-hdr-price'; pr.textContent='USD '+sm.toFixed(2)+'/mo'; left.appendChild(pr); }
        hdr.appendChild(left);
        const chev=document.createElement('span'); chev.className='chev'; chev.textContent='›'; hdr.appendChild(chev);
        pcs.appendChild(hdr);
        const body = document.createElement('div'); body.className = 'pcs-body';
        for(const row of sec.rows){
          const r=document.createElement('div'); r.className='pcs-row';
          r.innerHTML=`<span class="pcs-lbl">${esc(row.lbl)}</span><span class="pcs-val">${esc(row.val)}</span>`;
          body.appendChild(r);
        }
        pcs.appendChild(body);
        wrap.appendChild(pcs);
      }
    }
    card.appendChild(wrap);
  }

  // Storage block — interactive when STORAGE_DATA is present, static fallback otherwise
  if(p.storage && (p.storage.data || p.storage.disks.length || p.storage.subtotal)){
    const stg = document.createElement('div');
    stg.className = 'pc-storage';

    if(p.storage.data){
      // ── Interactive disk selector ───────────────────────────────────────────
      const sd = p.storage.data;
      const availTypes = Object.keys(sd.types);
      const TYPE_LBL = {premium_ssd:'Premium SSD', standard_ssd:'Standard SSD', standard_hdd:'Standard HDD'};
      const sizeFmt = gb => gb >= 1024 ? `${(gb/1024).toFixed(0)} TiB` : `${gb} GiB`;

      const titleEl = document.createElement('div');
      titleEl.className = 'pc-storage-title';
      titleEl.textContent = 'Storage';
      stg.appendChild(titleEl);

      const rowsWrap = document.createElement('div');
      stg.appendChild(rowsWrap);

      const subEl = document.createElement('div');
      subEl.className = 'pc-storage-subtotal';
      stg.appendChild(subEl);

      for(const fn of (p.storage.footnotes||[])){
        const fe = document.createElement('div');
        fe.className = 'pc-storage-fn';
        fe.textContent = fn;
        stg.appendChild(fe);
      }

      const addBtn = document.createElement('button');
      addBtn.className = 'pc-disk-add';
      addBtn.textContent = '＋ Add data disk';
      stg.appendChild(addBtn);

      // State: array of {role, type, tier}
      const state = (sd.defaults && sd.defaults.length)
        ? sd.defaults.map(d => ({role:d.role, type:d.type, tier:d.tier}))
        : [{role:'os', type:availTypes[0]||'standard_ssd', tier:(sd.types[availTypes[0]]||[])[0]?.tier||''}];

      const getPrice = (type, tier) => (sd.types[type]||[]).find(t=>t.tier===tier)?.price||0;

      function updateSub(){
        const tot = state.reduce((s,d) => s + getPrice(d.type, d.tier), 0);
        subEl.innerHTML = `<span>Storage subtotal</span><span>USD ${tot.toFixed(2)}/month</span>`;
      }

      function rebuildRows(){
        rowsWrap.innerHTML = '';
        state.forEach((row, i) => {
          const rowEl = document.createElement('div');
          rowEl.className = 'pc-disk-row';

          const lbl = document.createElement('span');
          lbl.className = 'pc-disk-role';
          lbl.textContent = row.role === 'os' ? 'OS disk' : 'Data disk';
          rowEl.appendChild(lbl);

          // Type dropdown
          const typeSel = document.createElement('select');
          typeSel.className = 'pc-disk-select';
          for(const t of availTypes){
            const o = document.createElement('option');
            o.value = t; o.textContent = TYPE_LBL[t]||t;
            if(t === row.type) o.selected = true;
            typeSel.appendChild(o);
          }
          typeSel.addEventListener('change', () => {
            state[i].type = typeSel.value;
            state[i].tier = (sd.types[typeSel.value]||[])[0]?.tier||'';
            rebuildRows();
          });
          rowEl.appendChild(typeSel);

          // Size dropdown
          const sizeSel = document.createElement('select');
          sizeSel.className = 'pc-disk-select';
          for(const {tier, size_gb} of (sd.types[row.type]||[])){
            const o = document.createElement('option');
            o.value = tier;
            o.textContent = `${tier} — ${sizeFmt(size_gb)}`;
            if(tier === row.tier) o.selected = true;
            sizeSel.appendChild(o);
          }
          const priceSpan = document.createElement('span');
          priceSpan.className = 'pc-disk-price';
          priceSpan.textContent = `USD ${getPrice(row.type, row.tier).toFixed(2)}/mo`;
          sizeSel.addEventListener('change', () => {
            state[i].tier = sizeSel.value;
            priceSpan.textContent = `USD ${getPrice(row.type, sizeSel.value).toFixed(2)}/mo`;
            updateSub();
          });
          rowEl.appendChild(sizeSel);
          rowEl.appendChild(priceSpan);

          // Remove button for data disks
          if(row.role !== 'os'){
            const rm = document.createElement('button');
            rm.className = 'pc-disk-rm'; rm.title = 'Remove'; rm.textContent = '×';
            rm.addEventListener('click', () => { state.splice(i,1); rebuildRows(); });
            rowEl.appendChild(rm);
          }

          rowsWrap.appendChild(rowEl);
        });
        updateSub();
      }

      addBtn.addEventListener('click', () => {
        const defType = availTypes.includes('standard_ssd') ? 'standard_ssd' : availTypes[availTypes.length-1]||'standard_ssd';
        state.push({role:'data', type:defType, tier:(sd.types[defType]||[])[0]?.tier||''});
        rebuildRows();
      });

      rebuildRows();

      // Expose live disk state for basket (reads current dropdown selections)
      card._getDiskState = () => state.map(d => {
        const entry = (sd.types[d.type]||[]).find(t => t.tier === d.tier);
        return {role: d.role==='os'?'OS disk':'Data disk', type:d.type, tier:d.tier, size_gb:entry?.size_gb||0, cost:getPrice(d.type,d.tier)};
      });

    } else {
      // Static fallback (no STORAGE_DATA)
      const st = document.createElement('div');
      st.className = 'pc-storage-title';
      st.textContent = 'Storage';
      stg.appendChild(st);
      for(const d of p.storage.disks){
        const row = document.createElement('div');
        row.className = 'pcs-row';
        row.innerHTML = `<span class="pcs-lbl">${esc(d.role)}</span><span class="pcs-val">${esc(d.label)} — ${esc(d.cost)}</span>`;
        stg.appendChild(row);
        if(d.note){
          const ne = document.createElement('div');
          ne.className = 'pc-storage-note';
          ne.textContent = d.note;
          stg.appendChild(ne);
        }
      }
      if(p.storage.subtotal){
        const sub = document.createElement('div');
        sub.className = 'pc-storage-subtotal';
        sub.innerHTML = `<span>Storage subtotal</span><span>${esc(p.storage.subtotal)}</span>`;
        stg.appendChild(sub);
      }
      for(const fn of (p.storage.footnotes||[])){
        const fe = document.createElement('div');
        fe.className = 'pc-storage-fn';
        fe.textContent = fn;
        stg.appendChild(fe);
      }
      // Static fallback: best-effort disk state for basket (no type/tier info available)
      card._getDiskState = () => (p.storage.disks||[]).map(d => ({role:d.role, type:'standard_ssd', tier:'', size_gb:0, cost:parseUSDMonth(d.cost)}));
    }

    card.appendChild(stg);
  }

  // Metadata used by "Add to Quote" button in the card footer
  card._pricingMeta = {sku:vm, os, region:reg, paygMonthly:parseUSDMonth(payg.monthly), rawText:text};
  card._getSelectedTerm = () => {
    if(_terms.length <= 1) return _terms[0] || {label:'PAYG', monthly:parseUSDMonth(payg.monthly)};
    const checked = card.querySelector('input[name="'+_rgroup+'"]:checked');
    return checked ? {label:checked.dataset.label, monthly:parseFloat(checked.value)} : (_terms[0]||{label:'PAYG',monthly:parseUSDMonth(payg.monthly)});
  };
  if(!card._getDiskState) card._getDiskState = () => [];

  return card;
}

// ── addMsg ───────────────────────────────────────────────────────────────────
function addMsg(role, text, type){
  const w  = document.createElement('div'); w.className = 'msg ' + role;
  const av = document.createElement('div'); av.className = 'av ' + role;
  av.textContent = role === 'bot' ? 'H' : 'You';
  const b = document.createElement('div');

  if(role === 'user'){
    b.className = 'bubble user';
    b.textContent = text;
  } else {
    const isPricing = type === 'pricing' || text.includes('=== Azure VM Pricing Estimate ===');

    if(isPricing){
      // Split on the inter-block separator produced by _show_full_pricing()
      // so that "all" replies render as separate cards rather than one garbled block.
      const blocks = text.split(/\n\n---\n\n/).filter(s => s.includes('=== Azure VM Pricing Estimate ==='));
      const cards  = blocks.map(blk => buildCard(blk)).filter(c => c !== null);

      if(cards.length){
        b.className = 'bubble bot card-wrap';
        cards.forEach((card, i) => {
          if(i > 0) card.style.marginTop = '12px';
          const foot = document.createElement('div'); foot.className = 'pc-foot';

          // ── Count + Add to Quote ────────────────────────────────────────
          const addRow = document.createElement('div'); addRow.className = 'pc-add-row';
          const qtyLbl = document.createElement('span'); qtyLbl.className = 'pc-qty-lbl'; qtyLbl.textContent = 'Qty:';
          const qtyInp = document.createElement('input'); qtyInp.type='number'; qtyInp.className='pc-qty'; qtyInp.value='1'; qtyInp.min='1'; qtyInp.max='999';
          const atqBtn = document.createElement('button'); atqBtn.className='pc-atq'; atqBtn.textContent='Add to Quote';
          atqBtn.onclick = () => addToQuote(card, qtyInp, atqBtn);
          addRow.appendChild(qtyLbl); addRow.appendChild(qtyInp); addRow.appendChild(atqBtn);
          foot.appendChild(addRow);

          const btns = document.createElement('div'); btns.className = 'dl-btns';
          ['excel','pdf'].forEach(fmt => {
            const dlBtn = document.createElement('button'); dlBtn.className = 'dl-btn';
            dlBtn.textContent = fmt === 'excel' ? '📥 Excel' : '📥 PDF';
            dlBtn.onclick = () => downloadReport(fmt, blocks[i].replace(/^STORAGE_DATA:.*\n?/m,''), dlBtn);
            btns.appendChild(dlBtn);
          });
          foot.appendChild(btns);
          card.appendChild(foot);
          b.appendChild(card);
        });
      } else {
        b.className = 'bubble bot';
        b.textContent = text;
      }
    } else {
      b.className = 'bubble bot';
      b.textContent = text;
    }
  }

  w.appendChild(av); w.appendChild(b);
  chat.appendChild(w); chat.scrollTop = chat.scrollHeight;
  return b;
}

// ── typing indicator ─────────────────────────────────────────────────────────
function addTyping(){
  const w  = document.createElement('div'); w.className = 'msg bot'; w.id = 'typing';
  const av = document.createElement('div'); av.className = 'av bot'; av.textContent = 'H';
  const b  = document.createElement('div'); b.className = 'bubble bot';
  b.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  w.appendChild(av); w.appendChild(b); chat.appendChild(w); chat.scrollTop = chat.scrollHeight;
}

// ── download report ──────────────────────────────────────────────────────────
async function downloadReport(format, pricingText, buttonEl){
  const endpoint = format === 'excel' ? '/api/report/excel' : '/api/report/pdf';
  const filename  = format === 'excel' ? 'azure-vm-pricing.xlsx' : 'azure-vm-pricing.pdf';
  const orig = buttonEl.textContent;
  buttonEl.disabled = true; buttonEl.textContent = 'Generating…';
  try{
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, pricing_text: pricingText}),
    });
    if(!r.ok) throw new Error('Server error ' + r.status);
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  } catch(e){ alert('Download failed: ' + e.message); }
  finally{ buttonEl.disabled = false; buttonEl.textContent = orig; }
}

// ── basket ───────────────────────────────────────────────────────────────────
function toggleQuotePanel(){
  const panel   = document.getElementById('quotePanel');
  const overlay = document.getElementById('qpOverlay');
  const isOpen  = panel.classList.toggle('open');
  overlay.classList.toggle('open', isOpen);
}

async function addToQuote(card, qtyInp, btnEl){
  const meta = card._pricingMeta;
  if(!meta){ alert('No pricing data on this card.'); return; }
  const sel = card._getSelectedTerm ? card._getSelectedTerm() : {label:'PAYG', monthly:meta.paygMonthly};
  if(!sel || !sel.monthly){ alert('No price found for the selected term.'); return; }
  const count = Math.max(1, parseInt(qtyInp.value)||1);
  const disks = card._getDiskState();

  btnEl.disabled = true; btnEl.textContent = 'Adding…';
  try{
    const r = await fetch('/api/basket', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        session_id: sessionId,
        sku: meta.sku,
        os: meta.os,
        region: meta.region,
        term: sel.label,
        count,
        vm_unit_cost: sel.monthly,
        disks,
        pricing_text: meta.rawText || null,
      }),
    });
    if(!r.ok) throw new Error('Server error ' + r.status);
    await loadBasket();
    btnEl.textContent = '&#10003; Added';
    setTimeout(() => { btnEl.textContent = 'Add to Quote'; btnEl.disabled = false; }, 1200);
    if(!document.getElementById('quotePanel').classList.contains('open')) toggleQuotePanel();
  } catch(e){
    alert('Failed to add to quote: ' + e.message);
    btnEl.textContent = 'Add to Quote'; btnEl.disabled = false;
  }
}

async function removeFromBasket(id){
  try{
    const r = await fetch('/api/basket/'+encodeURIComponent(id)+'?session_id='+encodeURIComponent(sessionId), {method:'DELETE'});
    if(!r.ok) throw new Error('Server error ' + r.status);
    await loadBasket();
  } catch(e){ alert('Failed to remove item: ' + e.message); }
}

async function clearQuote(){
  try{
    await fetch('/api/basket?session_id='+encodeURIComponent(sessionId), {method:'DELETE'});
    await loadBasket();
  } catch(e){ alert('Failed to clear quote: ' + e.message); }
}

async function loadBasket(){
  try{
    const r = await fetch('/api/basket?session_id='+encodeURIComponent(sessionId));
    if(!r.ok) return;
    renderBasket(await r.json());
  } catch(_){}
}

function renderBasket(items){
  const qpItems = document.getElementById('qpItems');
  const qbadge  = document.getElementById('qbadge');
  const qpGrand = document.getElementById('qpGrand');

  // Badge
  if(items.length){
    qbadge.textContent = items.length;
    qbadge.style.display = 'inline';
  } else {
    qbadge.style.display = 'none';
  }

  qpItems.innerHTML = '';

  if(!items.length){
    const empty = document.createElement('div');
    empty.className = 'qp-empty';
    empty.textContent = 'No VMs in quote yet.';
    qpItems.appendChild(empty);
    qpGrand.textContent = 'USD 0.00/month';
    document.getElementById('qpExport').style.display = 'none';
    return;
  }

  let grand = 0;
  for(const item of items){
    grand += item.line_total;
    const diskSum = item.disks.reduce((s,d) => s + d.cost, 0);

    const qi = document.createElement('div');
    qi.className = 'qi';

    // "3× Standard_D4s_v5 (3-Year RI + HB)"
    const countPfx = item.count > 1 ? item.count+'x ' : '';
    const lbl = document.createElement('div');
    lbl.className = 'qi-label';
    lbl.textContent = countPfx + item.sku + ' (' + item.term + ')';
    qi.appendChild(lbl);

    // "VM: USD X/mo + Storage: USD Y/mo  |  OS • Region"
    const det = document.createElement('div');
    det.className = 'qi-detail';
    let detHtml = 'VM: USD '+item.vm_unit_cost.toFixed(2)+'/mo';
    if(diskSum > 0) detHtml += ' + Storage: USD '+diskSum.toFixed(2)+'/mo';
    detHtml += '<br>'+esc(item.os)+' &bull; '+esc(item.region);
    det.innerHTML = detHtml;
    qi.appendChild(det);

    const foot = document.createElement('div');
    foot.className = 'qi-foot';

    const tot = document.createElement('span');
    tot.className = 'qi-total';
    tot.textContent = 'USD '+item.line_total.toFixed(2)+'/month';
    foot.appendChild(tot);

    const rm = document.createElement('button');
    rm.className = 'qi-rm';
    rm.textContent = 'Remove';
    rm.onclick = () => removeFromBasket(item.id);
    foot.appendChild(rm);

    qi.appendChild(foot);
    qpItems.appendChild(qi);
  }

  qpGrand.textContent = 'USD '+grand.toFixed(2)+'/month';
  document.getElementById('qpExport').style.display = 'flex';
}

async function exportBasket(format, btnEl){
  const endpoint = format === 'excel' ? '/api/basket/report/excel' : '/api/basket/report/pdf';
  const filename  = format === 'excel' ? 'azure-vm-quote.xlsx' : 'azure-vm-quote.pdf';
  const origText  = btnEl.textContent;
  btnEl.disabled = true;
  btnEl.textContent = '...';
  try{
    const r = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId}),
    });
    if(!r.ok) throw new Error('Server error ' + r.status);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  } catch(e){ alert('Export failed: ' + e.message); }
  finally{ btnEl.disabled = false; btnEl.textContent = origText; }
}

// ── pick selection (advisor → direct pricing) ─────────────────────────────────
// Parse "1", "2", "3", "option 2", "all" → 0-based indices, or null.
function parsePickSelection(text){
  const lower = text.trim().toLowerCase();
  if(/\ball\b/.test(lower)) return [0,1,2];
  const m = lower.match(/\b([123])\b/);
  if(m) return [parseInt(m[1],10) - 1];
  return null;
}

// For each selected index, send a fresh direct pricing query to /api/chat
// using a one-time session — bypasses advisor STATE 5 entirely.
async function fetchPricingForPicks(indices){
  const picks    = storedPicks;
  const numPicks = picks.skus.length;
  const valid    = indices.filter(i => i < numPicks);

  if(!valid.length){
    const opts = numPicks===1?'**1**':numPicks===2?'**1** or **2**':'**1**, **2**, or **3**';
    addMsg('bot',`I only have ${numPicks} option${numPicks!==1?'s':''} — please choose ${opts}.`);
    return;
  }

  addTyping();
  const parts = [];
  for(const idx of valid){
    const sku        = picks.skus[idx];
    const regionDisp = (picks.sku_region_displays && picks.sku_region_displays[idx]) || picks.region_display;
    const q          = `${sku} ${picks.os} ${regionDisp}`;
    try{
      const r = await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({session_id: mkSid(), message: q}),
      });
      const d = await r.json();
      if(d.reply && d.reply.includes('=== Azure VM Pricing Estimate ===')){
        parts.push(d.reply);
      }
    } catch(_){ /* skip individual fetch failure */ }
  }
  document.getElementById('typing')?.remove();
  if(parts.length){
    addMsg('bot', parts.join('\n\n---\n\n'), 'pricing');
  } else {
    addMsg('bot','Sorry, pricing fetch failed — please try again.');
  }
}

// ── send ─────────────────────────────────────────────────────────────────────
async function send(){
  const text = inp.value.trim(); if(!text) return;

  // If the user is selecting from stored advisor picks, fetch full pricing directly.
  if(storedPicks){
    const sel = parsePickSelection(text);
    if(sel !== null){
      inp.value = ''; inp.style.height = 'auto'; btn.disabled = true;
      addMsg('user', text);
      await fetchPricingForPicks(sel);
      btn.disabled = false; inp.focus();
      return;
    }
  }

  inp.value = ''; inp.style.height = 'auto'; btn.disabled = true;
  addMsg('user', text);
  addTyping();
  try{
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({session_id: sessionId, message: text}),
    });
    const d = await r.json();
    document.getElementById('typing')?.remove();
    const reply = d.reply || d.error || 'Unexpected response.';
    const type  = d.type  || 'conversation';
    if(d.picks) storedPicks = d.picks;  // store picks when advisor shows recommendations
    addMsg('bot', reply, type);
  } catch(e){
    document.getElementById('typing')?.remove();
    addMsg('bot', 'Network error: ' + e.message);
  } finally{ btn.disabled = false; inp.focus(); }
}

// ── welcome + sample chips ───────────────────────────────────────────────────
const SAMPLES = [
  'D4s_v5 Windows Australia East',
  '5x E8s_v3 Linux Southeast Asia with 3-year RI',
  'E8-4ads_v7 Windows Australia East',
  'D2_v3 Windows Australia Southeast',
];

function loadWelcome(){
  fetch('/api/welcome').then(r=>r.json()).then(d=>{
    const b = addMsg('bot', d.reply);
    const chips = document.createElement('div'); chips.className = 'chips';
    SAMPLES.forEach(s=>{
      const c = document.createElement('button'); c.className = 'chip'; c.textContent = s;
      c.onclick = () => { inp.value = s; inp.focus(); };
      chips.appendChild(c);
    });
    b.appendChild(chips);
  }).catch(() => addMsg('bot', 'Ready! Ask me about Azure VM pricing.'));
}

loadWelcome();
loadBasket();   // restore basket from backend on page load / refresh
