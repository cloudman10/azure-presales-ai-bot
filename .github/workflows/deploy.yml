name: Deploy HyperXen

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build deploy zip
        run: |
          python3 -c "
          import zipfile, os
          include = ['app', 'static', 'requirements.txt', 'startup.sh']
          exclude_dirs = {'.git', '.venv', '__pycache__', 'antenv'}
          with zipfile.ZipFile('deploy.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              for item in include:
                  if os.path.isfile(item):
                      zf.write(item, item)
                  else:
                      for d, dirs, files in os.walk(item):
                          dirs[:] = [x for x in dirs if x not in exclude_dirs]
                          for f in files:
                              if f.endswith('.pyc'): continue
                              p = os.path.join(d, f)
                              zf.write(p, p.replace(os.sep, '/'))
          "

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          az webapp deployment source config-zip \
            --resource-group rg-hyperxen-app-dev \
            --name hyperxen-pricing-bot-db5hmngq3woxa \
            --src deploy.zip

      - name: Deploy to Dev
        if: github.ref == 'refs/heads/dev'
        run: |
          az webapp deployment source config-zip \
            --resource-group rg-hyperxen-app-dev \
            --name hyperxen-pricing-bot-dev \
            --src deploy.zip
