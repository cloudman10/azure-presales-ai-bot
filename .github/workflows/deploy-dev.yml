name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment zip
        run: zip -r deploy.zip app static requirements.txt startup.sh

      - name: Deploy via Kudu zipdeploy (triggers Oryx rebuild)
        run: |
          CREDS=$(python3 -c "
          import xml.etree.ElementTree as ET, os
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'])
          p = next(x for x in root.findall('publishProfile') if 'MSDeploy' in x.get('publishMethod',''))
          print(p.get('userName') + ':' + p.get('userPWD'))
          ")
          curl -sf -X POST \
            "https://hyperxen-pricing-bot-dev.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "${CREDS}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip
          echo "zipdeploy complete"
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}

      - name: Sync startup.sh and restart app
        run: |
          CREDS=$(python3 -c "
          import xml.etree.ElementTree as ET, os
          root = ET.fromstring(os.environ['PUBLISH_PROFILE'])
          p = next(x for x in root.findall('publishProfile') if 'MSDeploy' in x.get('publishMethod',''))
          print(p.get('userName') + ':' + p.get('userPWD'))
          ")
          curl -sf -X PUT "https://hyperxen-pricing-bot-dev.scm.azurewebsites.net/api/vfs/site/startup.sh" \
            -u "${CREDS}" -H "If-Match: *" --data-binary @startup.sh
          echo "startup.sh synced to /home/site/startup.sh"
          curl -sf -X DELETE "https://hyperxen-pricing-bot-dev.scm.azurewebsites.net/api/processes/0" \
            -u "${CREDS}" || true
          echo "app process restarted"
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
